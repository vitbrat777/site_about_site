В какое время мы сегодня живем?

Сегодня творятся непонятные вещи, неправда ли?!

Безумие?!

Безумие пытается заменить мудрость! Пытается взлететь выше солнца.

Мне это, что то напоминает. 
Невольно вспоминается песня времен коммунизма. 
Когда всех призывали к гласности и демократии.
И песня тех времен звучала так: " Орленок, орленок, 
взлети выше солнца". 
Как то опять невольно припоминается история падшего ангела.
Когда он говорил в сердце своем:" Взойду на небо 
и выше звезд Творца поставлю престол свой"
НО, НО он был низринут в ад, в глубины преисподней! 
  А еще ,,безумие,, этого времени невольно ведет к древней истории. 
Времена Древнего Храма. Эпоха Маковеев. Когда один царь напал на
другую страну и насмехался над Священными реликвиями того народа. 
Антиох IV, который называл себя Эпифаном(что значит славный). 
Но в народе его называли Эпиман(что значит безумный)
Антиох IV. Безумный напал на тот народ и насмехался и 
превозносился над их реликвиями. 
Именно та история напоминает  о нашем времени.
  Давайте немного поговорим о значении двух слов:
СЛАВНЫЙ и БЕЗУМНЫЙ. Антиох Эпифан и Антиох Эпиман.
Прозвища происходят от греческих слов:

Эпифан (Epiphanes, Ἐπιφανής) — буквально «явленный», 
«проявившийся», «славный», «явление божества». 

Эпиман (Epimanes, Ἐπιμανής) — насмешливое прозвище. 
Буквально означает «безумный», «сумасшедший», «одержимый безумием».

Поэтому часто говорят, что:

Антиох Эпифан = «Антиох славный
Антиох Эпиман = «Антиох безумный».
Исторические источники сообщают, что Антиох IV Эпифан официально 
использовал титул «Эпифан» (Epiphanes).

Однако многие современники насмешливо называли его
 «Эпиман» (Epimanes) — «Безумец», 
«Сумасшедший». Это было связано с тем, что некоторые считали 
его поведение странным, 
непредсказуемым и недостойным царя.

Получалась игра слов:

Epiphanes (Эпифан) → «явление божества».
Epimanes (Эпиман) → «безумец».

То есть народное прозвище фактически высмеивало его
 официальное царское прозвание.

Особенно часто такое противопоставление встречается 
у древнегреческого историка Полибий и 
других античных авторов.`;
